<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 text-center">AI Travel Planner</h1>

        <form id="travelForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-medium">Where do you want to go?</label>
                <input type="text" id="destination" placeholder="e.g., Tokyo, Japan" required
                    class="w-full mt-1 p-3 border rounded-lg focus:ring focus:ring-blue-200 outline-none">
            </div>
            <div>
                <label class="block text-gray-700 font-medium">For how many days?</label>
                <input type="number" id="days" min="1" max="14" placeholder="e.g., 5" required
                    class="w-full mt-1 p-3 border rounded-lg focus:ring focus:ring-blue-200 outline-none">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                Generate My Itinerary ✈️
            </button>
        </form>

        <div id="loading" class="hidden mt-6 text-center text-blue-500 font-medium">Building your perfect trip...</div>

        <div id="resultBox" class="hidden mt-8 p-6 bg-blue-50 rounded-lg border border-blue-100">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Your Itinerary</h2>
            <div id="itineraryText" class="text-gray-700 whitespace-pre-wrap leading-relaxed"></div>
        </div>
    </div>

    <script>
        document.getElementById('travelForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const destination = document.getElementById('destination').value;
            const days = document.getElementById('days').value;
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const itineraryText = document.getElementById('itineraryText');

            // UI states
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                // Call your Node.js backend
                const response = await fetch('http://localhost:3000/api/generate-trip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ destination, days })
                });

                const data = await response.json();

                if (data.success) {
                    itineraryText.innerText = data.itinerary;
                    resultBox.classList.remove('hidden');
                } else {
                    alert('Error generating trip. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Could not connect to the server.');
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
